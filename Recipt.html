<!DOCTYPE html>
<html>
<head>
<link rel="icon" type="icon" href="Images/Icon.webp">
<title>Hyrule transport</title>
</head>
<body>
<div id="ReciptDiv">
 <p>hello?</p>
</div>
<script>
    //Getting variables!------------------------------------------------------------------
    RECIPT = document.getElementById("ReciptDiv");
    let pickedRouteLocations = JSON.parse(sessionStorage.getItem("PickedRouteLocations"));
    let pickedRoutePrices = JSON.parse(sessionStorage.getItem("PickedRoutePrices"));
    let totalPrice = sessionStorage.getItem("TotalPrice")
    console.log(sessionStorage.getItem("PickedRoutePrices"));
    console.log(sessionStorage.getItem("PickedRouteLocations"));

    //Writing to the page-----------------------------------------------------------------
    RECIPT.innerHTML = "<H1>YOUR TICKET</H1> <br> <br>";

    RECIPT.innerHTML += "<h1>traveling from: " + pickedRouteLocations[0] + "</h1>";

    for (let i = 1; i < (pickedRouteLocations.length-1); i++)
    {
        RECIPT.innerHTML += "<h1>before passing through: " + pickedRouteLocations[i] + " (" + pickedRoutePrices[i] + " <img src='Images/Green Rupee.png'>)</h1>";
    }

    RECIPT.innerHTML += "<h1>and arriving at: " + pickedRouteLocations[pickedRouteLocations.length-1] + " (" + pickedRoutePrices[pickedRouteLocations.length-1] + " <img src='Images/Green Rupee.png'>)</h1>";
    RECIPT.innerHTML += "<h1>Costing a total of " + totalPrice + " <img src='Images/Green Rupee.png'></h1>";
    RECIPT.innerHTML += "<h1>Ticket number: " + sessionStorage.getItem("OrderNumber") + "</h1>";
</script>
</body>
</html>
